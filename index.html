<title>CSAT 대시보드 | MP 병원비환급</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root {
    --accent:     #3D6FE8;
    --accent-dim: #2A55C4;
    --star:       #F59E0B;
    --star-empty: #D9DCE6;
    --good:       #16A34A;
    --bg:         #EEF0F7;
    --surface:    #FFFFFF;
    --surface-2:  #F4F5FB;
    --border:     #E0E3EF;
    --text-1:     #0F1828;
    --text-2:     #5C6480;
    --text-3:     #9AA0B8;
    --shadow:     0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --accent:     #5B8BF5;
      --accent-dim: #3D6FE8;
      --star:       #FBBF24;
      --star-empty: #2D3148;
      --good:       #22C55E;
      --bg:         #0A0D17;
      --surface:    #131726;
      --surface-2:  #1A1F33;
      --border:     #252C46;
      --text-1:     #E8ECF8;
      --text-2:     #8892B4;
      --text-3:     #515A7A;
      --shadow:     0 1px 3px rgba(0,0,0,.3), 0 4px 12px rgba(0,0,0,.2);
    }
  }
  :root[data-theme="light"] {
    --accent:#3D6FE8; --accent-dim:#2A55C4; --star:#F59E0B; --star-empty:#D9DCE6;
    --good:#16A34A; --bg:#EEF0F7; --surface:#FFFFFF; --surface-2:#F4F5FB;
    --border:#E0E3EF; --text-1:#0F1828; --text-2:#5C6480; --text-3:#9AA0B8;
    --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04);
  }
  :root[data-theme="dark"] {
    --accent:#5B8BF5; --accent-dim:#3D6FE8; --star:#FBBF24; --star-empty:#2D3148;
    --good:#22C55E; --bg:#0A0D17; --surface:#131726; --surface-2:#1A1F33;
    --border:#252C46; --text-1:#E8ECF8; --text-2:#8892B4; --text-3:#515A7A;
    --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.2);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text-1);
    min-height: 100vh;
    padding: 0 0 60px;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(8px);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
  }
  .header h1 { font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
  .header-meta { font-size: 12px; color: var(--text-3); font-variant-numeric: tabular-nums; }
  .badge {
    font-size: 10px; font-weight: 700; letter-spacing: .04em;
    padding: 2px 7px; border-radius: 99px;
    background: color-mix(in srgb, var(--accent) 12%, transparent);
    color: var(--accent);
  }

  /* Main */
  .main { max-width: 900px; margin: 0 auto; padding: 28px 24px 0; }

  /* Stats */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 22px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 20px; box-shadow: var(--shadow);
  }
  .stat-label {
    font-size: 10.5px; font-weight: 700; letter-spacing: .07em;
    text-transform: uppercase; color: var(--text-3); margin-bottom: 8px;
  }
  .stat-value {
    font-size: 30px; font-weight: 700; font-variant-numeric: tabular-nums;
    color: var(--text-1); letter-spacing: -.02em; line-height: 1;
  }
  .stat-value.accent { color: var(--accent); }
  .stat-value.star   { color: var(--star); }
  .stat-sub { font-size: 12px; color: var(--text-2); margin-top: 5px; font-variant-numeric: tabular-nums; }

  /* Section title */
  .section-title {
    font-size: 11px; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; color: var(--text-3);
    margin-bottom: 10px; padding-left: 2px;
  }

  /* Card shell */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px 22px;
    box-shadow: var(--shadow); margin-bottom: 22px;
  }

  /* Distribution */
  .dist-row {
    display: grid; grid-template-columns: 34px 1fr 56px;
    align-items: center; gap: 12px; margin-bottom: 9px;
  }
  .dist-row:last-child { margin-bottom: 0; }
  .dist-label {
    font-size: 13px; font-weight: 500; color: var(--text-2);
    display: flex; align-items: center; gap: 3px; font-variant-numeric: tabular-nums;
  }
  .dist-star-icon { color: var(--star); font-size: 10px; }
  .dist-bar-track { height: 7px; background: var(--star-empty); border-radius: 99px; overflow: hidden; }
  .dist-bar-fill {
    height: 100%; background: var(--star); border-radius: 99px;
    transition: width .65s cubic-bezier(.25,.46,.45,.94);
  }
  .dist-count { font-size: 12px; color: var(--text-2); text-align: right; font-variant-numeric: tabular-nums; }

  /* Trend chart */
  .trend-card { position: relative; }
  .trend-legend {
    display: flex; gap: 16px; margin-bottom: 14px;
    font-size: 11px; font-weight: 600; letter-spacing: .03em; color: var(--text-2);
  }
  .legend-dot {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 2px; margin-right: 5px; vertical-align: middle;
  }
  .legend-dot.bar  { background: var(--star); }
  .legend-dot.line { background: var(--accent); border-radius: 50%; }
  canvas#trend-canvas { display: block; width: 100%; cursor: crosshair; }

  /* Tooltip */
  #trend-tooltip {
    position: fixed; pointer-events: none;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px;
    font-size: 12px; color: var(--text-1);
    box-shadow: var(--shadow);
    display: none; z-index: 100; white-space: nowrap;
  }

  /* Date group */
  .date-group-header {
    display: flex; align-items: center; gap: 10px;
    margin: 20px 0 10px; padding: 0 2px;
  }
  .date-group-header:first-child { margin-top: 0; }
  .date-label {
    font-size: 12px; font-weight: 700; color: var(--text-2);
    font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  .date-line { flex: 1; height: 1px; background: var(--border); }
  .date-count {
    font-size: 11px; color: var(--text-3);
    font-variant-numeric: tabular-nums; white-space: nowrap;
  }

  /* Response cards */
  .response-list { display: flex; flex-direction: column; gap: 8px; max-height: 520px; overflow-y: auto; padding-right: 6px; scroll-behavior: smooth; }
  .response-list::-webkit-scrollbar { width: 6px; }
  .response-list::-webkit-scrollbar-track { background: var(--surface-2); border-radius: 3px; }
  .response-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .response-list::-webkit-scrollbar-thumb:hover { background: var(--text-3); }
  .response-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px;
    box-shadow: var(--shadow); transition: border-color .15s;
  }
  .response-card:hover { border-color: var(--accent); }
  .response-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 7px;
  }
  .stars-display { display: flex; gap: 2px; font-size: 15px; line-height: 1; }
  .star-filled  { color: var(--star); }
  .star-empty-c { color: var(--star-empty); }
  .response-time { font-size: 11px; color: var(--text-3); font-variant-numeric: tabular-nums; }
  .response-comment {
    font-size: 13.5px; color: var(--text-2); line-height: 1.55;
    background: var(--surface-2); border-radius: 7px; padding: 9px 13px; margin-top: 2px;
  }
  .no-comment { font-size: 12px; color: var(--text-3); font-style: italic; }
  .chat-id-chip {
    display: inline-block; font-size: 10px;
    font-family: "SF Mono", "Consolas", monospace;
    color: var(--text-3); background: var(--surface-2);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 1px 6px; margin-top: 7px;
  }

  /* Empty & notice */
  .empty-state {
    background: var(--surface); border: 1px dashed var(--border);
    border-radius: 12px; padding: 44px 24px; text-align: center;
  }
  .empty-icon { font-size: 28px; margin-bottom: 10px; }
  .empty-title { font-size: 14px; font-weight: 600; color: var(--text-2); margin-bottom: 5px; }
  .empty-desc  { font-size: 13px; color: var(--text-3); line-height: 1.5; }
  .notice {
    margin-top: 18px; padding: 11px 15px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 9px; font-size: 13px; color: var(--text-2);
    display: flex; align-items: center; gap: 8px;
  }
  .notice strong { color: var(--text-1); }

  /* Period filter */
  .filter-wrap { margin-bottom: 18px; }
  .month-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
  .day-bar   { display: flex; gap: 4px; flex-wrap: wrap; min-height: 0; padding-left: 2px; }
  .m-btn {
    font-size: 12px; font-weight: 600; padding: 6px 14px;
    border-radius: 99px; border: 1.5px solid var(--border);
    background: var(--surface); color: var(--text-2);
    cursor: pointer; transition: all .15s; line-height: 1;
  }
  .m-btn:hover  { border-color: var(--accent); color: var(--accent); }
  .m-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .d-btn {
    font-size: 11px; font-weight: 600; padding: 4px 11px;
    border-radius: 99px; border: 1px solid var(--border);
    background: var(--surface-2); color: var(--text-3);
    cursor: pointer; transition: all .15s; line-height: 1.3;
  }
  .d-btn:hover  { border-color: var(--accent); color: var(--accent); background: var(--surface); }
  .d-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Star filter */
  .star-filter-bar { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
  .s-btn {
    font-size: 12px; font-weight: 700; padding: 5px 12px;
    border-radius: 99px; border: 1.5px solid var(--border);
    background: var(--surface); color: var(--text-3);
    cursor: pointer; transition: all .15s; line-height: 1; letter-spacing: .02em;
  }
  .s-btn:hover { border-color: var(--star); color: var(--star); }
  .s-btn.active { background: var(--star); border-color: var(--star); color: #fff; }
  .s-btn.all-stars.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  @media (max-width: 600px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
    .stat-card:last-child { grid-column: 1 / -1; }
    .header { padding: 14px 16px; }
    .main { padding: 18px 14px 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .dist-bar-fill { transition: none; }
  }
</style>

<div id="trend-tooltip"></div>

<div class="header">
  <div class="header-left">
    <div class="logo-dot"></div>
    <h1>CSAT 대시보드</h1>
    <span class="badge">Beta</span>
  </div>
  <span class="header-meta" id="collected-at">—</span>
</div>

<div class="main">

  <div class="filter-wrap">
    <div class="month-bar" id="date-bar"></div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">누적 발송</div>
      <div class="stat-value" id="stat-sent">—</div>
      <div class="stat-sub" id="stat-scanned">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">회신율</div>
      <div class="stat-value accent" id="stat-rate">—</div>
      <div class="stat-sub" id="stat-responded">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">평균 별점</div>
      <div class="stat-value star" id="stat-avg">—</div>
      <div class="stat-sub" id="stat-avg-sub">—</div>
    </div>
  </div>

  <p class="section-title" id="trend-title">CSAT 운영 일별 트렌드</p>
  <div class="card trend-card">
    <div class="trend-legend">
      <span><span class="legend-dot bar"></span>응답 건수</span>
      <span><span class="legend-dot line"></span>평균 별점</span>
    </div>
    <canvas id="trend-canvas" height="110"></canvas>
  </div>

  <p class="section-title">별점 분포</p>
  <div class="card" id="dist-card"></div>

  <p class="section-title">응답 목록</p>
  <div class="star-filter-bar" id="star-filter-bar"></div>
  <div id="response-list" class="response-list"></div>
  <div id="notice-area"></div>

</div>

<script>
window.CSAT_DATA = {
    "collectedAt":  "2026-07-10 16:35",
    "totalScanned":  86,
    "totalSent":  86,
    "totalResponded":  8,
    "responseRate":  9.3,
    "avgScore":  3.75,
    "scoreMap":  {
                     "5":  5,
                     "4":  0,

                     "1":  2
                 },
    "responses":  [
                      {

                          "stars":  5,
                          "comment":  "문자로 하는것 보다는 전화 연결로 했으면 좋을것 같습니다",
                          "time":  "2026-07-10 16:00"
                      },
                      {
                          "chatId":  "6a28c9632e62b95f4ea1",
                          "stars":  5,
                          "comment":  "",
                          "time":  "2026-07-10 14:50"
                      },
                      {
                          "chatId":  "6a506b4277af1f3bd8f5",
                          "stars":  5,
                          "comment":  "빠른  처리  바랍니다",
                          "time":  "2026-07-10 14:42"
                      },
                      {
                          "chatId":  "6a505c953a97506f3276",
                          "stars":  3,
                          "comment":  "",
                          "time":  "2026-07-10 14:10"
                      },
                      {
                          "chatId":  "6a505866cad68755b2cf",
                          "stars":  5,
                          "comment":  "",
                          "time":  "2026-07-10 14:10"
                      },
                      {
                          "chatId":  "6a30d89bbf7e86583943",
                          "stars":  5,
                          "comment":  "잘하고있어요 화이팅",
                          "time":  "2026-07-09 16:57"
                      },
                      {
                          "chatId":  "6a4db29414f910d8b037",
                          "stars":  1,
                          "comment":  "",
                          "time":  "2026-07-09 16:51"
                      },
                      {
                          "chatId":  "6a4ee52f2375fc7a779d",
                          "stars":  1,
                          "comment":  "빠른처리 부탁드립니다",
                          "time":  "2026-07-09 17:37"
                      }
                  ],
    "noResponseCount":  78,
    "dailyStats":  {
                       "2026-07-10":  {
                                          "sent":  54,
                                          "responded":  5,
                                          "responseRate":  9.3,
                                          "avgScore":  4.6,
                                          "scoreMap":  {
                                                           "5":  4,
                                                           "4":  0,
                                                           "3":  1,
                                                           "2":  0,
                                                           "1":  0
                                                       }
                                      },
                       "2026-07-09":  {
                                          "sent":  32,
                                          "responded":  3,
                                          "responseRate":  9.4,
                                          "avgScore":  2.33,
                                          "scoreMap":  {
                                                           "5":  1,
                                                           "4":  0,
                                                           "3":  0,
                                                           "2":  0,
                                                           "1":  2
                                                       }
                                      }
                   }
};

(function () {
  var D = window.CSAT_DATA;

  /* ── utils ── */
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function getVar(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  /* ── Header ── */
  document.getElementById('collected-at').textContent = '집계: ' + D.collectedAt;

  /* ── 날짜 필터 버튼 ── */
  var dateBar = document.getElementById('date-bar');

  function ymLabel(ym) {
    var p = ym.split('-');
    return (parseInt(p[0]) % 100) + '년 ' + parseInt(p[1]) + '월';
  }

  function addDateBtn(label, key) {
    var btn = document.createElement('button');
    btn.className = 'm-btn' + (key === 'all' ? ' active' : '');
    btn.dataset.key = key;
    btn.textContent = label;
    btn.onclick = function() {
      dateBar.querySelectorAll('.m-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      renderAll(key);
    };
    dateBar.appendChild(btn);
  }

  addDateBtn('전체', 'all');
  if (D.dailyStats) {
    Object.keys(D.dailyStats)
      .filter(function(dk) { return dk !== '미상'; })
      .sort().reverse()
      .forEach(function(dk) {
        var p = dk.split('-');
        addDateBtn(parseInt(p[1]) + '월 ' + parseInt(p[2]) + '일', dk);
      });
  }

  /* monthMap은 renderAll 내부 month: 처리에서만 사용 */
  var monthMap = {};
  if (D.dailyStats) {
    Object.keys(D.dailyStats).forEach(function(dk) {
      if (dk === '미상') return;
      var ym = dk.substring(0, 7);
      if (!monthMap[ym]) monthMap[ym] = [];
      monthMap[ym].push(dk);
    });
  }

  /* ── 별점 필터 상태 ── */
  var selectedStar  = 0;   // 0 = 전체
  var currentFiltered = [];

  /* ── renderAll: stats + dist + list ── */
  function renderAll(key) {
    var stats, sm, filtered, subLabel;

    if (key === 'all') {
      stats    = { sent: D.totalSent, responded: D.totalResponded, responseRate: D.responseRate, avgScore: D.avgScore };
      sm       = D.scoreMap;
      filtered = D.responses || [];
      /* 누적 시작일 동적 계산 */
      var dk0 = Object.keys(D.dailyStats || {}).filter(function(k){ return /^\d{4}-\d{2}-\d{2}$/.test(k); }).sort()[0];
      var sinceLabel = dk0 ? (parseInt(dk0.split('-')[1]) + '/' + parseInt(dk0.split('-')[2]) + ' 이후 누적') : '전체 누적';
      subLabel = sinceLabel;

    } else if (key.substring(0, 6) === 'month:') {
      var ym = key.substring(6);
      var daysInMonth = monthMap[ym] || [];
      var mSent = 0, mResp = 0;
      var mSm = {"5":0,"4":0,"3":0,"2":0,"1":0};
      daysInMonth.forEach(function(dk) {
        var ds = D.dailyStats && D.dailyStats[dk];
        if (!ds) return;
        mSent += ds.sent; mResp += ds.responded;
        [5,4,3,2,1].forEach(function(s) {
          mSm[String(s)] += (ds.scoreMap && ds.scoreMap[String(s)]) ? ds.scoreMap[String(s)] : 0;
        });
      });
      var mAvg = mResp > 0
        ? Math.round((5*mSm["5"]+4*mSm["4"]+3*mSm["3"]+2*mSm["2"]+1*mSm["1"])/mResp*100)/100
        : 0;
      stats    = { sent: mSent, responded: mResp,
                   responseRate: mSent > 0 ? Math.round(mResp/mSent*1000)/10 : 0,
                   avgScore: mAvg };
      sm       = mSm;
      filtered = (D.responses||[]).filter(function(r){ return r.time && r.time.substring(0,7) === ym; });
      subLabel = ymLabel(ym) + ' 집계';

    } else {
      /* 특정 날짜 */
      var ds = D.dailyStats && D.dailyStats[key];
      stats = ds ? { sent: ds.sent, responded: ds.responded, responseRate: ds.responseRate, avgScore: ds.avgScore }
                 : { sent: 0, responded: 0, responseRate: 0, avgScore: 0 };
      sm       = ds ? ds.scoreMap : {"5":0,"4":0,"3":0,"2":0,"1":0};
      filtered = (D.responses||[]).filter(function(r){ return r.time && r.time.substring(0,10) === key; });
      var kp = key.split('-');
      subLabel = parseInt(kp[1]) + '월 ' + parseInt(kp[2]) + '일 기준';
    }

    document.getElementById('stat-sent').textContent      = stats.sent.toLocaleString() + '건';
    document.getElementById('stat-scanned').textContent   = stats.responded.toLocaleString() + '건 회신';
    document.getElementById('stat-rate').textContent      = stats.responseRate + '%';
    document.getElementById('stat-responded').textContent = stats.responded + ' / ' + stats.sent + '건';
    document.getElementById('stat-avg').textContent       = stats.avgScore > 0 ? '★ ' + stats.avgScore : '—';
    document.getElementById('stat-avg-sub').textContent   = stats.responded > 0 ? stats.responded + '건 기준' : '응답 없음';

    /* 트렌드 제목 */
    var trendTitle = key === 'all' ? 'CSAT 운영 일별 트렌드'
      : key.substring(0, 6) === 'month:' ? ymLabel(key.substring(6)) + ' 일별 트렌드'
      : key + ' 전후 2주 트렌드';
    document.getElementById('trend-title').textContent = trendTitle;

    renderDist(sm, stats.responded);
    currentFiltered = filtered;
    /* 별점 필터 리셋 */
    selectedStar = 0;
    document.querySelectorAll('.s-btn').forEach(function(b) {
      b.classList.toggle('active', b.dataset.star === '0');
    });
    renderList(filtered);
    drawTrendForKey(key);
  }

  /* ── 별점 필터 버튼 ── */
  var starBar = document.getElementById('star-filter-bar');
  (function() {
    var items = [
      { label: '전체 별점', star: 0, cls: 'all-stars' },
      { label: '★★★★★', star: 5, cls: '' },
      { label: '★★★★', star: 4, cls: '' },
      { label: '★★★', star: 3, cls: '' },
      { label: '★★', star: 2, cls: '' },
      { label: '★', star: 1, cls: '' }
    ];
    items.forEach(function(item) {
      var btn = document.createElement('button');
      btn.className = 's-btn' + (item.cls ? ' ' + item.cls : '') + (item.star === 0 ? ' active' : '');
      btn.dataset.star = String(item.star);
      btn.textContent = item.label;
      btn.onclick = function() {
        selectedStar = item.star;
        starBar.querySelectorAll('.s-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        var toShow = item.star === 0
          ? currentFiltered
          : currentFiltered.filter(function(r) { return r.stars === item.star; });
        renderList(toShow);
      };
      starBar.appendChild(btn);
    });
  })();

  /* ── Trend: dailyStats 기반 데이터 조회 ── */
  var allDS = D.dailyStats || {};

  function dstatEntry(dk) {
    var ds = allDS[dk];
    if (!ds) return { count: 0, avg: 0 };
    return { count: ds.responded || 0, avg: ds.avgScore || 0 };
  }

  function localDate(d) {
    return d.getFullYear() + '-'
      + String(d.getMonth()+1).padStart(2,'0') + '-'
      + String(d.getDate()).padStart(2,'0');
  }

  function computeTrendDays(key) {
    var result = [];
    if (key === 'all') {
      /* dailyStats 첫 날 ~ 오늘 */
      var dkeys = Object.keys(allDS).filter(function(k){ return /^\d{4}-\d{2}-\d{2}$/.test(k); }).sort();
      if (dkeys.length === 0) return result;
      var cur = new Date(dkeys[0] + 'T00:00:00');
      var today = new Date(); today.setHours(23,59,59,0);
      while (cur <= today) {
        var dk = localDate(cur);
        var e = dstatEntry(dk);
        result.push({ date: dk, label: (cur.getMonth()+1)+'/'+cur.getDate(), count: e.count, avg: e.avg });
        cur.setDate(cur.getDate() + 1);
      }
    } else if (key.substring(0, 6) === 'month:') {
      var ym = key.substring(6);
      var parts = ym.split('-');
      var yr = parseInt(parts[0]), mo = parseInt(parts[1]);
      var dim = new Date(yr, mo, 0).getDate();
      for (var d = 1; d <= dim; d++) {
        var dk = ym + '-' + (d < 10 ? '0' : '') + d;
        var e = dstatEntry(dk);
        result.push({ date: dk, label: d+'일', count: e.count, avg: e.avg });
      }
    } else {
      /* 특정 날짜: 전후 2주 */
      var base = new Date(key + 'T00:00:00');
      for (var i = -6; i <= 7; i++) {
        var dt = new Date(base); dt.setDate(base.getDate() + i);
        var dk = localDate(dt);
        var e = dstatEntry(dk);
        result.push({ date: dk, label: (dt.getMonth()+1)+'/'+dt.getDate(), count: e.count, avg: e.avg, highlight: dk === key });
      }
    }
    return result;
  }

  /* ── Trend canvas ── */
  var canvas  = document.getElementById('trend-canvas');
  var tooltip = document.getElementById('trend-tooltip');
  var PAD = { top: 12, right: 44, bottom: 28, left: 36 };
  var currentTrendDays = computeTrendDays('all');

  function drawTrendForKey(key) {
    currentTrendDays = computeTrendDays(key);
    drawTrend();
  }

  /* ── Initial render ── */
  renderAll('all');

  function drawTrend() {
    var days = currentTrendDays;
    var container = canvas.parentElement;
    var W = Math.max(300, container.getBoundingClientRect().width - 44);
    canvas.width  = Math.round(W * window.devicePixelRatio);
    canvas.height = Math.round(110 * window.devicePixelRatio);
    canvas.style.width  = W + 'px';
    canvas.style.height = '110px';

    var ctx = canvas.getContext('2d');
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

    var cW = W, cH = 110;
    var plotW = cW - PAD.left - PAD.right;
    var plotH = cH - PAD.top - PAD.bottom;

    var isDark = document.documentElement.getAttribute('data-theme') === 'dark'
      || (!document.documentElement.getAttribute('data-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);

    var starColor   = '#F59E0B';
    var accentColor = isDark ? '#5B8BF5' : '#3D6FE8';
    var borderColor = isDark ? '#252C46' : '#E0E3EF';
    var text3Color  = isDark ? '#515A7A' : '#9AA0B8';
    var text2Color  = isDark ? '#8892B4' : '#5C6480';

    ctx.clearRect(0, 0, cW, cH);

    var maxCount = Math.max(1, Math.max.apply(null, days.map(function(d){ return d.count; })));
    var barW = (plotW / days.length) * 0.55;

    /* grid lines */
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = 0.5;
    [0, 0.5, 1].forEach(function(f) {
      var y = PAD.top + plotH * (1 - f);
      ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left + plotW, y); ctx.stroke();
    });

    /* bars */
    days.forEach(function(d, i) {
      var x = PAD.left + (i + 0.5) * (plotW / days.length);
      var barH = d.count > 0 ? (d.count / maxCount) * plotH : 0;
      var y = PAD.top + plotH - barH;
      ctx.fillStyle = d.count > 0
        ? starColor
        : (borderColor + '66');
      var r = 3;
      if (barH < 1) { barH = 0; }
      if (barH > 0) {
        ctx.beginPath();
        ctx.moveTo(x - barW/2 + r, y);
        ctx.lineTo(x + barW/2 - r, y);
        ctx.arcTo(x + barW/2, y, x + barW/2, y + r, r);
        ctx.lineTo(x + barW/2, y + barH);
        ctx.lineTo(x - barW/2, y + barH);
        ctx.arcTo(x - barW/2, y, x - barW/2 + r, y, r);
        ctx.closePath();
        ctx.fill();
      } else {
        ctx.fillStyle = borderColor;
        ctx.fillRect(x - barW/2, PAD.top + plotH - 1, barW, 1);
      }
    });

    /* score line */
    var linePoints = [];
    days.forEach(function(d, i) {
      if (d.count === 0) return;
      var x = PAD.left + (i + 0.5) * (plotW / days.length);
      var y = PAD.top + plotH * (1 - d.avg / 5);
      linePoints.push({ x: x, y: y, d: d });
    });

    if (linePoints.length > 0) {
      ctx.strokeStyle = accentColor;
      ctx.lineWidth = 2;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.beginPath();
      linePoints.forEach(function(p, i) {
        if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
      });
      ctx.stroke();

      linePoints.forEach(function(p) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
        ctx.fillStyle = accentColor;
        ctx.fill();
        ctx.strokeStyle = getVar('--surface') || '#fff';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      });
    }

    /* x labels (show every 2nd) */
    ctx.fillStyle = text3Color;
    ctx.font = '9px -apple-system, system-ui, sans-serif';
    ctx.textAlign = 'center';
    days.forEach(function(d, i) {
      if (i % 2 !== 0) return;
      var x = PAD.left + (i + 0.5) * (plotW / days.length);
      ctx.fillText(d.label, x, cH - 4);
    });

    /* y-axis left: count */
    ctx.fillStyle = text3Color;
    ctx.font = '9px -apple-system, system-ui, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(maxCount, PAD.left - 4, PAD.top + 4);
    ctx.fillText('0', PAD.left - 4, PAD.top + plotH + 4);

    /* y-axis right: score */
    ctx.fillStyle = accentColor;
    ctx.textAlign = 'left';
    ctx.fillText('5.0', PAD.left + plotW + 4, PAD.top + 4);
    ctx.fillText('0', PAD.left + plotW + 4, PAD.top + plotH + 4);
  }

  /* hover tooltip */
  canvas.addEventListener('mousemove', function(e) {
    var days = currentTrendDays;
    var rect = canvas.getBoundingClientRect();
    var mx = e.clientX - rect.left;
    var plotW = canvas.offsetWidth - PAD.left - PAD.right;
    var slotW = plotW / days.length;
    var idx = Math.floor((mx - PAD.left) / slotW);
    if (idx < 0 || idx >= days.length) { tooltip.style.display = 'none'; return; }
    var d = days[idx];
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top  = (e.clientY - 10) + 'px';
    tooltip.innerHTML =
      '<strong>' + d.date + '</strong><br>' +
      '응답 <strong>' + d.count + '건</strong>' +
      (d.count > 0 ? ' &nbsp;·&nbsp; 평균 <strong style="color:var(--accent)">★ ' + d.avg + '</strong>' : '');
  });
  canvas.addEventListener('mouseleave', function() { tooltip.style.display = 'none'; });

  // 레이아웃 완료 후 그리기
  setTimeout(drawTrend, 50);
  window.addEventListener('resize', drawTrend);

  /* ── Distribution ── */
  function renderDist(sm, totalResponded) {
    var distCard = document.getElementById('dist-card');
    distCard.innerHTML = '';
    var maxC = Math.max(1, sm['5']||0, sm['4']||0, sm['3']||0, sm['2']||0, sm['1']||0);
    [5,4,3,2,1].forEach(function(k) {
      var cnt = sm[String(k)] || 0;
      var pct = totalResponded > 0 ? Math.round(cnt / totalResponded * 100) : 0;
      var barW = Math.round(cnt / maxC * 100);
      var row = document.createElement('div');
      row.className = 'dist-row';
      row.innerHTML =
        '<div class="dist-label"><span class="dist-star-icon">★</span>' + k + '</div>' +
        '<div class="dist-bar-track"><div class="dist-bar-fill" style="width:0%" data-w="' + barW + '"></div></div>' +
        '<div class="dist-count">' + cnt + '건' +
          (totalResponded > 0 ? ' <span style="color:var(--text-3)">(' + pct + '%)</span>' : '') +
        '</div>';
      distCard.appendChild(row);
    });
    requestAnimationFrame(function() {
      setTimeout(function() {
        distCard.querySelectorAll('.dist-bar-fill').forEach(function(el) {
          el.style.width = el.dataset.w + '%';
        });
      }, 80);
    });
  }

  /* ── Response list ── */
  function renderList(responses) {
    var listEl = document.getElementById('response-list');
    listEl.innerHTML = '';
    responses = responses.slice().sort(function(a, b) {
      return (b.time || '').localeCompare(a.time || '');
    });
    if (responses.length === 0) {
      listEl.innerHTML =
        '<div class="empty-state">' +
          '<div class="empty-icon">📭</div>' +
          '<div class="empty-title">응답이 없어요</div>' +
          '<div class="empty-desc">해당 날짜에 수집된 응답이 없습니다.</div>' +
        '</div>';
      return;
    }
    var grouped = {}, groupOrder = [];
    responses.forEach(function(r) {
      var key = r.time ? r.time.substring(0, 10) : '날짜 미상';
      if (!grouped[key]) { grouped[key] = []; groupOrder.push(key); }
      grouped[key].push(r);
    });
    groupOrder.forEach(function(dateKey) {
      var group = grouped[dateKey];
      var hdr = document.createElement('div');
      hdr.className = 'date-group-header';
      var displayDate = dateKey;
      if (dateKey !== '날짜 미상') {
        var parts = dateKey.split('-');
        displayDate = parts[0] + '년 ' + parseInt(parts[1]) + '월 ' + parseInt(parts[2]) + '일';
      }
      hdr.innerHTML =
        '<span class="date-label">' + displayDate + '</span>' +
        '<span class="date-line"></span>' +
        '<span class="date-count">' + group.length + '건</span>';
      listEl.appendChild(hdr);

      group.forEach(function(r) {
        var card = document.createElement('div');
        card.className = 'response-card';
        var starsHtml = '';
        for (var i = 1; i <= 5; i++) {
          starsHtml += '<span class="' + (i <= r.stars ? 'star-filled' : 'star-empty-c') + '">★</span>';
        }
        var timeStr = r.time ? r.time.substring(11) : '';
        var commentHtml = (r.comment && r.comment.trim())
          ? '<div class="response-comment">' + esc(r.comment) + '</div>'
          : '<div class="response-comment no-comment">코멘트 없음</div>';

        card.innerHTML =
          '<div class="response-top">' +
            '<div class="stars-display">' + starsHtml + '</div>' +
            '<span class="response-time">' + esc(timeStr) + '</span>' +
          '</div>' +
          commentHtml +
          '<span class="chat-id-chip">' + esc(r.chatId) + '</span>';
        listEl.appendChild(card);
      });
    });
  }

  /* ── No-response notice ── */
  if (D.noResponseCount > 0) {
    document.getElementById('notice-area').innerHTML =
      '<div class="notice">📨 설문은 발송됐지만 <strong>' + D.noResponseCount + '명</strong>이 아직 응답하지 않았어요.</div>';
  }

})();
</script>
